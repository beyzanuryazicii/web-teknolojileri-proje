<style>
.login-container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #2563eb, #1e3a8a);
}

.login-box {
  background: white;
  padding: 40px;
  border-radius: 15px;
  width: 350px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.login-box h2 {
  margin-bottom: 20px;
}

.login-box input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.login-box button {
  width: 100%;
  padding: 12px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.login-box button:hover {
  background: #1e40af;
}

.error {
  color: red;
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="login-container">

  <div class="login-box">
    <h2>Giriş Yap</h2>

    <form action="php/login.php" method="POST" onsubmit="return kontrol()">

      <input type="text" id="email" name="email" placeholder="Öğrenci Maili">
      <input type="password" id="sifre" name="sifre" placeholder="Şifre">

      <button type="submit">Giriş Yap</button>

      <div id="hata" class="error"></div>

    </form>
  </div>

</div>

<script>
function kontrol(){
  let email = document.getElementById("email").value;
  let sifre = document.getElementById("sifre").value;

  if(email == "" || sifre == ""){
    document.getElementById("hata").innerText = "Tüm alanları doldurun!";
    return false;
  }

  if(!email.includes("@")){
    document.getElementById("hata").innerText = "Geçerli bir mail girin!";
    return false;
  }

  return true;
}
</script>

</body>
