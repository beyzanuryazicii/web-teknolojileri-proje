  >

<body>

<header class="navbar">
  <div class="logo-area">
    <div class="logo">B</div>

  </div>

  <nav class="menu">

  <a href="login.html" class="login-btn">
    <i class="fa-regular fa-user"></i>
    Login
  </a>
</header>

<div class="login-container">

  <div class="login-box">
    <h2>Giriş Yap</h2>

    <form action="php/login.php" method="POST">

      <input type="text"
             id="email"
             name="email"
             placeholder="Öğrenci Maili">

      <input type="password"
             id="sifre"
             name="sifre"
             placeholder="Şifre">

      <button type="submit">Giriş Yap</button>

      <div id="hata" class="error"></div>

    </form>
  </div>

</div>

<script>

function kontrol(){

  let email = document.getElementById("email").value.trim();
  let sifre = document.getElementById("sifre").value.trim();

  let hata = document.getElementById("hata");

  hata.innerText = "";

  if(email === "" || sifre === ""){
    hata.innerText = "Tüm alanları doldurun!";
    return false;
  }

  let regex = /^[bB][0-9]+@sakarya\.edu\.tr$/;

  if(!regex.test(email)){
    hata.innerText = "Geçerli bir Sakarya Üniversitesi maili girin!";
    return false;
  }

  return true;
}

</script>

</body>
</html>
