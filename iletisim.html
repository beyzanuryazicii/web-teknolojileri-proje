    <title>İletişim</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Vue.js -->
    <script src="https://unpkg.com/vue@3"></script>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">İletişim Formu</h1>

    <!-- FORM -->
    <form id="iletisimForm" action="php/iletisim.php" method="POST">

        <!-- İSİM -->
        <div class="mb-3">
            <label>Ad Soyad</label>
            <input type="text" id="ad" name="ad" class="form-control">
        </div>

        <!-- EMAIL -->
        <div class="mb-3">
            <label>Email</label>
            <input type="text" id="email" name="email" class="form-control">
        </div>

        <!-- TELEFON -->
        <div class="mb-3">
            <label>Telefon</label>
            <input type="text" id="telefon" name="telefon" class="form-control">
        </div>

        <!-- CİNSİYET (RADIO) -->
        <div class="mb-3">
            <label>Cinsiyet</label><br>
            <input type="radio" name="cinsiyet" value="Kadın"> Kadın
            <input type="radio" name="cinsiyet" value="Erkek"> Erkek
        </div>

        <!-- İLGİ ALANI (CHECKBOX) -->
        <div class="mb-3">
            <label>İlgi Alanları</label><br>
            <input type="checkbox" name="ilgi[]" value="Teknoloji"> Teknoloji
            <input type="checkbox" name="ilgi[]" value="Sağlık"> Sağlık
            <input type="checkbox" name="ilgi[]" value="Yapay Zeka"> Yapay Zeka
        </div>

        <!-- ŞEHİR (SELECT) -->
        <div class="mb-3">
            <label>Şehir</label>
            <select name="sehir" class="form-control">
                <option value="">Seçiniz</option>
                <option value="İstanbul">İstanbul</option>
                <option value="Ankara">Ankara</option>
                <option value="Sakarya">Sakarya</option>
            </select>
        </div>

        <!-- MESAJ -->
        <div class="mb-3">
            <label>Mesaj</label>
            <textarea name="mesaj" id="mesaj" class="form-control"></textarea>
        </div>

        <!-- BUTONLAR -->
        <div class="text-center mt-4">

            <!-- Native JS -->
            <button type="button" onclick="jsKontrol()" class="btn btn-primary">
                JS ile Kontrol
            </button>

            <!-- Vue JS -->
            <button type="button" @click="vueKontrol" class="btn btn-success">
                Vue ile Kontrol
            </button>

            <!-- Gönder -->
            <button type="submit" class="btn btn-danger">
                Gönder
            </button>

        </div>

    </form>

    <!-- HATA MESAJI -->
    <div id="hata" class="mt-3 text-danger text-center"></div>

</div>

<!-- JS -->
<script src="js/iletisim.js"></script>

</body>
</html>
