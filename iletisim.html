<!-- JS -->
<script src="js/main.js"></script>

<!-- VUE -->
<script>
const { createApp } = Vue;

const app = createApp({

  methods: {

    vueKontrol() {

      let ad = document.getElementById("ad").value;
      let email = document.getElementById("email").value;
      let telefon = document.getElementById("telefon").value;

      let hata = "";

      // Ad kontrolü
      if(ad.length < 3){
        hata += "Ad en az 3 karakter olmalı\n";
      }

      // Email kontrolü
      let regex = /^[a-zA-Z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$/;

      if(!regex.test(email)){
        hata += "Geçerli email giriniz\n";
      }

      // Telefon kontrolü
      if(!/^[0-9]+$/.test(telefon)){
        hata += "Telefon sadece rakam olmalı\n";
      }

      // Sonuç
      document.getElementById("hata").innerText =
        hata || "Vue kontrol başarılı ✅";
    }

  }

});

// Vue uygulamasını forma bağla
const vm = app.mount("#iletisimForm");

// Butona tıklayınca çalıştır
document.getElementById("vueBtn")
.addEventListener("click", () => {
  vm.vueKontrol();
});
</script>
