<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İletişim | Beyzanur Yazıcı</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Vue -->
  <script src="https://unpkg.com/vue@3"></script>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo-area">
    <div class="logo">B</div>
    <span>Beyzanur Yazıcı</span>
  </div>

  <nav class="menu">
    <a href="index.html">Hakkımda</a>
    <a href="cv.html">CV</a>
    <a href="sehrim.html">Şehrim</a>
    <a href="mirasimiz.html">Mirasımız</a>
    <a href="ilgi-alanlarim.html">İlgi Alanlarım</a>
    <a href="iletisim.html" class="active">İletişim</a>
  </nav>

  <a href="login.html" class="login-btn">
    <i class="fa-regular fa-user"></i>
    Login
  </a>
</header>

<!-- FORM -->
<div class="form-container">

  <h1 class="text-center mb-4">İletişim Formu</h1>

  <form id="iletisimForm" action="php/iletisim.php" method="POST">

    <div class="form-group">
      <label>Ad Soyad</label>
      <input type="text" id="ad" name="ad" class="form-control custom-input">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="text" id="email" name="email" class="form-control custom-input">
    </div>

    <div class="form-group">
      <label>Telefon</label>
      <input type="text" id="telefon" name="telefon" class="form-control custom-input">
    </div>

    <div class="form-group">
      <label>Cinsiyet</label><br>
      <input type="radio" name="cinsiyet" value="Kadın"> Kadın
      <input type="radio" name="cinsiyet" value="Erkek"> Erkek
    </div>

    <div class="form-group">
      <label>İlgi Alanları</label><br>
      <input type="checkbox" name="ilgi[]" value="Teknoloji"> Teknoloji
      <input type="checkbox" name="ilgi[]" value="Sağlık"> Sağlık
      <input type="checkbox" name="ilgi[]" value="Yapay Zeka"> Yapay Zeka
    </div>

    <div class="form-group">
      <label>Şehir</label>
      <select name="sehir" class="form-control custom-input">
        <option value="">Seçiniz</option>
        <option>İstanbul</option>
        <option>Ankara</option>
        <option>Sakarya</option>
      </select>
    </div>

    <div class="form-group">
      <label>Mesaj</label>
      <textarea name="mesaj" id="mesaj" class="form-control custom-input"></textarea>
    </div>

    <div class="text-center mt-4">

      <!-- JS -->
      <button type="button" onclick="jsKontrol()" class="btn btn-primary">
        JS ile Kontrol
      </button>

      <!-- Vue -->
      <button type="button" id="vueBtn" class="btn btn-success">
        Vue ile Kontrol
      </button>

      <!-- Submit -->
      <button type="submit" class="btn btn-danger">
        Gönder
      </button>

    </div>

  </form>

  <div id="hata" class="mt-3 text-danger text-center"></div>

</div>

<!-- JS -->
<script src="js/iletisim.js"></script>

<!-- VUE -->
<script>
const { createApp } = Vue;

createApp({
  methods: {
    vueKontrol() {
      let ad = document.getElementById("ad").value;
      let email = document.getElementById("email").value;
      let telefon = document.getElementById("telefon").value;

      if(ad === "" || email === "" || telefon === ""){
        document.getElementById("hata").innerText = "Tüm alanları doldurun!";
        return;
      }

      if(!email.includes("@")){
        document.getElementById("hata").innerText = "Geçerli email girin!";
        return;
      }

      if(isNaN(telefon)){
        document.getElementById("hata").innerText = "Telefon sadece rakam olmalı!";
        return;
      }

      document.getElementById("hata").innerText = "Vue kontrol başarılı!";
    }
  }
}).mount("#iletisimForm");

// Vue butonuna bağla
document.getElementById("vueBtn").addEventListener("click", function(){
  Vue.createApp()._component.methods.vueKontrol();
});
</script>

</body>
</html>
